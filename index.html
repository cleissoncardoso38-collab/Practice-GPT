<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>GPT Practice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background-color: #808080;
            color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        header {
            background-color: #2e2e2e;
            width: 100%;
            padding: 20px;

        }

        h1 {
            color: #808080;
            text-align: center;
            margin-bottom: 20px;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        h2 {
            color: #2e2e2e;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            max-width: 500px;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .box {
            width: 200px;
            height: 100px;
            background-color: darkseagreen;
            padding: 10px;
            border: 2px solid #000000;
            border-radius: 10px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .box:hover img {
            transform: scale(1.05);
            transition: 0.3s ease;
        }

        .my-photo {
            width: 200px;
            height: 200px;

        }

        .family-photo {
            width: 200px;
            height: 200px;
        }
        .family-photo img {
            object-position: center 30%;
        }

        .btn {
            background-color: #4169e1;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #2e4bb5;
        }

        .btn:active {
            opacity: 0.6;
        }

        footer {
            background-color: #2e2e2e;
            width: 100%;
            padding: 15px;
            text-align: center;
            color: #ffffff;

        }
        @media (max-width: 600px){
            p {
                font-size: 16px;
                padding: 0 10px;
            }
            .my-photo, .family-photo {
                width: 150px;
                height: 150px;
            }
            main {
                padding: 10px;
            }
            .btn {
                width: 100%;
                text-align: center;
            }
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Cleisson Cardoso</h1>
    </header>

    <main>
        <h2>My Personal Profile</h2>
        <p>
            Hi! My name is Cleisson Cardoso. I am 46 years old, I am married,
            and I have one daughter.
        </p>
        <p>
            My daughter's name is Sabrine and she is 16 years old. She's beautiful.
        </p>
        <div class="box my-photo">

            <img src="./assets/my-photo.jpeg" alt="foto-cleisson" />

        </div>
        <div class="box family-photo">
            
            <img src="./assets/my-daughter-and-me.jpeg" alt="daughter-and-father-photo">

        </div>
        <a href="https://www.instagram.com/clei_oliver/" target="_blank" class="btn">
            Click here to see my Instagram Profile
        </a>

    </main>
    <footer>
        <h3> © 2026 Cleisson Cardoso</h3>
    </footer>

</body>

</html>
